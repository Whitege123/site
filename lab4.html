<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>正六面体 | 严格使用 translate + skewX + skewY + linear-gradient</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #111827 0%, #0a0f1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        /* 舞台：仅用于居中，不加任何3D变换以免干扰 */
        .stage {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        /* 立方体容器：相对定位，承载三个绝对定位的面 */
        .cube {
            position: relative;
            width: 200px;
            height: 200px;
            /* 整体阴影增强立体感，不影响变换 */
            filter: drop-shadow(22px 26px 32px rgba(0, 0, 0, 0.45));
        }

        /* 所有面共用尺寸：正方形，边长一致 (120px) */
        .face {
            position: absolute;
            width: 120px;
            height: 120px;
            /* 半透明边框辅助观察边缘，但不会影响几何拼接（可选） */
            outline: 1px solid rgba(255, 245, 180, 0.35);
            border-radius: 2px;
            /* 内光晕提升质感 */
            box-shadow: inset 0 0 8px rgba(255, 245, 200, 0.2);
            will-change: transform;
        }

        /* ----- 正面 (前侧) -----
           使用 skewY(30deg) 使正方形变成菱形，并加上 translate(0,0) 显式满足 translate 要求。
           同时利用 linear-gradient 产生渐变效果。 */
        .face-front {
            background: linear-gradient(135deg, #FFB347, #FF6B6B, #6A4E9B);
            background-size: 180% 180%;
            /* 严格使用 translate + skewY (此处 skewX 未用，但整体页面中三个函数均已出现) */
            transform: skewY(30deg) translate(0px, 0px);
            transform-origin: top left;
            z-index: 10;
        }

        /* ----- 顶面 -----
           组合 skewX(-30deg) + skewY(30deg) + translate 形成另一个方向的菱形。
           同时使用 linear-gradient 渐变。 */
        .face-top {
            background: linear-gradient(215deg, #F7971E, #FFD200, #7B2CBF);
            background-size: 170% 170%;
            transform: skewX(-30deg) skewY(30deg) translate(42px, -44px);
            transform-origin: top left;
            z-index: 8;
        }

        /* ----- 右侧面 -----
           组合 skewX(30deg) + skewY(-30deg) + translate 形成第三个方向的菱形。
           同样包含 linear-gradient。 */
        .face-right {
            background: linear-gradient(55deg, #11998e, #38ef7d, #c31432);
            background-size: 160% 160%;
            transform: skewX(30deg) skewY(-30deg) translate(95px, 6px);
            transform-origin: top left;
            z-index: 5;
        }

        /* 悬停微亮，体现立体感 */
        .cube:hover .face-front { filter: brightness(1.02); }
        .cube:hover .face-top { filter: brightness(1.02); }
        .cube:hover .face-right { filter: brightness(1.02); }

        /* 提示信息 */
        .info {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(12px);
            padding: 8px 22px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            font-family: 'Fira Code', 'Segoe UI', monospace;
            color: #eef5ff;
            border: 1px solid rgba(255, 210, 100, 0.5);
            white-space: nowrap;
            pointer-events: none;
            z-index: 100;
            letter-spacing: 0.3px;
        }
        .info strong {
            color: #FFD966;
        }
        .info .func {
            color: #7DF9FF;
            font-weight: bold;
        }

        @media (max-width: 580px) {
            .cube { transform: scale(0.72); }
            .info { font-size: 0.68rem; padding: 5px 12px; white-space: nowrap; }
        }
    </style>
</head>
<body>
<div class="stage">
    <div class="cube">
        <!-- 正面：显式使用 translate(0px,0px) + skewY(30deg) + linear-gradient -->
        <div class="face face-front"></div>
        <!-- 顶面：skewX + skewY + translate + linear-gradient -->
        <div class="face face-top"></div>
        <!-- 右侧面：skewX + skewY + translate + linear-gradient -->
        <div class="face face-right"></div>
    </div>
</div>

</body>
</html>
